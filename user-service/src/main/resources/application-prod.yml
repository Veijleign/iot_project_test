server:
  port: 8080

spring:
  application:
    name: user-service

  # DB connection (Uses K8s Env Var, falls back to localhost)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iot_platform}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  # JPA | Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # liquibase
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  # Jackson (json)
  jackson:
    default-property-inclusion: NON_NULL

# Keycloak config
keycloak:
  server-url: http://keycloak.109.69.17.82.nip.io
  main-realm: iot-platform
  admin-client-id: admin-client
  admin-client-secret: ${KEYCLOAK_ADMIN_SECRET:jyJ8h7XDJt1zACtdZjz29IeC5IPg8x0v}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# App Custom Config
user:
  default-role: viewer
  registration:
    enabled: true
  organization:
    max-users: 1000

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.iot_platform: DEBUG